<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Disease Detection System</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>AI Human Disease Detection System</h1>
    </div>

    <div class="grid">

        <div class="form-section">
            <h3>Patient Information</h3>

            <input type="text" id="name" placeholder="Enter Patient Name">

            <h3>Select Symptoms</h3>

            <div class="symptoms">
                <label><input type="checkbox" value="fever"> Fever</label>
                <label><input type="checkbox" value="cough"> Cough</label>
                <label><input type="checkbox" value="headache"> Headache</label>
                <label><input type="checkbox" value="fatigue"> Fatigue</label>
                <label><input type="checkbox" value="vomiting"> Vomiting</label>
                <label><input type="checkbox" value="chest_pain"> Chest Pain</label>
                <label><input type="checkbox" value="breathlessness"> Breathlessness</label>
                <label><input type="checkbox" value="sore_throat"> Sore Throat</label>
            </div>

            <button onclick="analyze()">Analyze Symptoms</button>
        </div>

        <div class="result-section">
            <div class="result-card" id="resultCard">
                <h2 id="disease"></h2>
                <p id="confidenceText"></p>

                <div class="confidence-bar">
                    <div class="confidence-fill" id="confidenceFill"></div>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
